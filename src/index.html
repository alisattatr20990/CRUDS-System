<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./output.css" rel="stylesheet" />
    <title>CRUDS - Clean Interactive UI</title>
  </head>

  <body class="bg-gray-800 text-white font-sans antialiased">
    <header class="text-center py-6 md:text-xl">
      <h2 class="font-bold uppercase tracking-widest text-sky-400">curds</h2>
      <p class="font-light text-gray-400">
        <span class="uppercase font-bold text-sky-400">c</span>reate
        <span class="uppercase font-bold text-sky-400">u</span>pdate
        <span class="uppercase font-bold text-sky-400">r</span>ead
        <span class="uppercase font-bold text-sky-400">d</span>elete
        <span class="uppercase font-bold text-sky-400">s</span>earch
      </p>
    </header>

    <main class="mx-auto w-[90%] md:w-[80%] my-4">
      <section id="input-sec">
        <form id="crud-form">
          <input
            class="text-gray-300 bg-gray-950 w-full rounded-md outline-none p-2 my-1 border border-transparent transition-all duration-300 hover:border-sky-500/50 hover:scale-[1.005] focus:ring-1 focus:ring-sky-500 focus:bg-gray-900"
            type="text"
            id="name-item"
            placeholder="اسم العنصر"
          />

          <div class="md:flex gap-1">
            <input
              class="text-gray-300 bg-gray-950 w-full rounded-md outline-none p-2 my-1 border border-transparent transition-all duration-300 hover:border-sky-500/50 hover:scale-[1.01] focus:ring-1 focus:ring-sky-500 focus:bg-gray-900"
              type="number"
              id="price"
              placeholder="السعر"
            />

            <input
              class="text-gray-300 bg-gray-950 w-full rounded-md outline-none p-2 my-1 border border-transparent transition-all duration-300 hover:border-sky-500/50 hover:scale-[1.01] focus:ring-1 focus:ring-sky-500 focus:bg-gray-900"
              type="number"
              id="taxes"
              placeholder="الضريبة"
            />

            <input
              class="text-gray-300 bg-gray-950 w-full rounded-md outline-none p-2 my-1 border border-transparent transition-all duration-300 hover:border-sky-500/50 hover:scale-[1.01] focus:ring-1 focus:ring-sky-500 focus:bg-gray-900"
              type="number"
              id="discount"
              placeholder="الخصم"
            />

            <input
              class="text-white bg-sky-700 w-full rounded-md outline-none p-2 my-1 font-bold text-center transition-all duration-300"
              type="text"
              id="total"
              readonly
              placeholder="المجموع"
            />
          </div>

          <div class="relative w-full my-1">
            <input type="file" id="imgg" accept=".jpg, .jpeg" class="hidden" />

            <label
              for="imgg"
              class="flex items-center justify-between bg-gray-950 text-gray-400 w-full rounded-md p-2 border border-transparent cursor-pointer transition-all duration-300 hover:border-sky-500/50 hover:bg-gray-900 focus-within:ring-1 focus-within:ring-sky-500"
            >
              <span id="file-name-custom">ارفع صورة المنتج (JPG فقط)</span>
              <span
                class="bg-sky-600 text-white px-3 py-1 rounded text-sm font-bold shadow-md hover:bg-sky-500"
              >
                اختيار ملف
              </span>
            </label>
          </div>

          <input
            class="text-gray-300 bg-gray-950 w-full rounded-md outline-none p-2 my-1 border border-transparent transition-all duration-300 hover:border-sky-500/50 hover:scale-[1.005] focus:ring-1 focus:ring-sky-500 focus:bg-gray-900"
            type="number"
            id="count"
            placeholder="الكمية"
          />

          <select
            id="category"
            onchange="category_drob_list()"
            class="text-gray-300 bg-gray-950 w-full rounded-md outline-none p-2 my-1 border border-transparent transition-all duration-300 hover:border-sky-500/50 hover:scale-[1.005] focus:ring-1 focus:ring-sky-500 focus:bg-gray-900"
          >
            <option value="" disabled selected>اختر الفئة...</option>

            <option value="اجهزة كهربائية">اجهزة كهربائية</option>
            <option value="هواتف">هواتف</option>
            <option value="حاسبات">حاسبات</option>

            <option value="اخرى">اخرى</option>
          </select>
        </form>

        <button
          class="bg-sky-600 hover:bg-sky-500 w-full rounded-md my-2 py-2 font-bold transition-all duration-300 hover:scale-[1.01] active:scale-95 shadow-lg"
          id="btn-create"
          type="submit"
        >
          انشاء
        </button>
      </section>

      <section id="search-sec" class="mt-6 border-t border-gray-700 pt-4">
        <input
          class="text-gray-300 bg-gray-950 w-full rounded-md outline-none p-2 my-1 border border-transparent transition-all duration-300 hover:border-sky-500/50 focus:ring-1 focus:ring-sky-500"
          type="text"
          id="search"
          placeholder="بحث..."
          onkeyup="searchdate(this.value)"
        />

        <select
          id="search-category-list"
          class="hidden text-gray-300 bg-gray-950 w-full rounded-md outline-none p-2 my-1 border border-transparent transition-all duration-300 hover:border-sky-500/50 focus:ring-1 focus:ring-sky-500"
          onchange="searchdate(this.value)"
        ></select>

        <div class="md:flex md:gap-4">
          <button
            onclick="getSerchMood(this.id)"
            class="bg-sky-600 hover:bg-sky-500 w-full rounded-md my-1 py-2 font-medium transition-all"
            id="btn-Search-By-title"
          >
            البحث بواسطة الاسم
          </button>
          <button
            onclick="getSerchMood(this.id)"
            class="bg-sky-600 hover:bg-sky-500 w-full rounded-md my-1 py-2 font-medium transition-all"
            id="btn-Search-By-Category"
          >
            البحث بواسطة الفئة
          </button>
        </div>
      </section>
      <section id="table-sec" class="mt-8 overflow-x-auto">
        <table class="w-full text-left border-separate border-spacing-y-2">
          <thead class="bg-gray-950">
            <tr class="uppercase text-xs tracking-wider text-sky-400">
              <th class="p-3">تسلسل</th>
              <th class="p-3">الصورة</th>
              <th class="p-3">الاسم</th>
              <th class="p-3">السعر</th>
              <th class="p-3">الضريبة</th>
              <th class="p-3">الكميه</th>
              <th class="p-3">الخصم</th>
              <th class="p-3 text-white">المجموع</th>
              <th class="p-3">الفئة</th>
              <th class="p-3 text-center">تحديث</th>
              <th class="p-3 text-center">حذف</th>
            </tr>
          </thead>
          <tbody id="tbody" class="text-sm"></tbody>
        </table>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
